<h2>滚动条显示方式</h2>
<p class="subtitle">当前编辑器的内容区没有滚动条，只有键盘/鼠标滚轮翻页。你希望滚动条如何出现？</p>

<div class="options">
  <div class="option" data-choice="always" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>始终显示</h3>
      <p>滚动条一直可见，类似 VS Code。永远知道你在文档中的位置。</p>
    </div>
  </div>
  <div class="option" data-choice="hover" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>悬停/滚动时显示</h3>
      <p>滚动条默认隐藏，鼠标移到编辑区右边缘或开始滚动时才出现，过一会儿淡出。类似 macOS 原生风格。</p>
    </div>
  </div>
  <div class="option" data-choice="thin" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>始终显示（窄版）</h3>
      <p>始终可见但很窄（~8px），悬停时变宽方便拖拽。兼顾两种风格。</p>
    </div>
  </div>
</div>
